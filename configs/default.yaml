data:
  dataset: synthetic
  path: data/raw/behavioral_sequences.json
  unsw_path: data/raw/unsw_nb15
  format: auto
  seq_len: 64
  train_split: 0.70
  val_split: 0.15
  test_split: 0.15
  batch_size: 32
  num_workers: 0
  normalize: true
  split_strategy: group
  use_fixed_splits: true
  splits_path: splits/split_v1.json
  use_weighted_sampler: true

model:
  type: hybrid_temporal
  hidden_dim: 96
  num_layers: 2
  channels: 96
  d_model: 96
  nhead: 4
  dim_feedforward: 192
  dropout: 0.3

training:
  seed: 42
  epochs: 14
  early_stopping_patience: 4
  learning_rate: 0.0005
  weight_decay: 0.0005
  grad_clip_norm: 1.0
  loss_type: bce
  focal_gamma: 1.5
  class_weight_alpha: 0.7
  results_dir: results/run_1
  log_dir: results/logs

evaluation:
  threshold: 0.50
  tune_threshold: true
  threshold_metric: balanced_recall
  save_confusion_matrix: true

baseline:
  name: logistic_regression
