name: CI Smoke Test

on: [push, pull_request]

jobs:
  quick-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run quick test
        run: |
          python run_unsw_publication_pipeline.py --quick-test
