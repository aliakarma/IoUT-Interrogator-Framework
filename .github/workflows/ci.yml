name: README Reproducibility Validation

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  validate-readme-commands:
    name: Validate README Commands (Py3.10)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies from requirements.txt
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate quick pipeline command (README)
        run: |
          set -euxo pipefail
          echo "Running: python scripts/run_full_pipeline.py --quick"
          python scripts/run_full_pipeline.py --quick

      - name: Validate full pipeline command (CI-reduced)
        run: |
          set -euxo pipefail
          echo "Running reduced full pipeline for CI:"
          echo "python scripts/reproduce_all.py --seed 42 --runs 2 --intervals 5 --skip-training"
          python scripts/reproduce_all.py --seed 42 --runs 2 --intervals 5 --skip-training
